# Podstawowa konfiguracja aplikacji
spring.application.name=bank-api
spring.profiles.default=local
# Domyslny port (mozna nadpisac SERVER_PORT lub --server.port=). Przy zajetym porcie aplikacja probuje kolejnych, jesli nie ustawisz --server.port i nie uruchamiasz profilu prod.
server.port=${SERVER_PORT:8081}

# Ustawienia Hibernate (JPA) + Flyway wspólne dla wszystkich profili
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Flyway - wersjonowanie schematu bazy
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Opcjonalne: Formatowanie SQL w konsoli dla lepszej czytelności
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI 3 + Swagger UI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha