# Port, na którym uruchomi się lokalny serwer
server.port=8081

# Konfiguracja bazy danych H2 (w pamięci)
spring.datasource.url=jdbc:h2:mem:bank_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate - narzędzie, które za chwilę zautomatyzuje tworzenie tabel
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Włączenie graficznej konsoli H2 w przeglądarce
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console